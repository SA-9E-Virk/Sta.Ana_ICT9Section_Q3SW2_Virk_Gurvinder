!DOCTYPE html>
<html>

<head>
<title>Product Locator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */
body{
font-family: Gill Sans MT;
background-image: url('https://i.pinimg.com/originals/90/70/32/9070324cdfc07c68d60eed0c39e77573.gif');
background-size: cover;
background-repeat: no-repeat;
}

/* NAVBAR */
.navbar{<<
background-image: linear-gradient(to right,#061f45,#0a60d1);
}

h1{
color:white;
text-shadow:2px 2px #484a49;
}

/* CENTER BOX */
#brands{
width:700px;
background-color:rgba(0,215,252,0.45);
height:170px;
padding:20px;
border-radius:10px;
margin-top:40px;
}

/* INPUT */
#budget{
text-align:center;
font-size:22px;
color:#072f70;
margin-top:10px;
}

/* BUTTON ROW */
.row{
display:flex;
justify-content:center;
gap:80px;
margin-top:20px;
text-align:center;
}

/* MAIN BUTTONS */
#buttons{
color:white;
background-color:#1c233a;
border:2px solid #4c516b;
border-radius:25px;
width:260px;
font-size:20px;
padding:10px;
}

#buttons:hover{
background-color:#0a60d1;
transform:scale(1.05);
transition:0.3s;
}

/* BRAND BUTTONS */
#brand_btn{
font-size:15px;
background-image:linear-gradient(to right,black,#161f36);
color:white;
border-radius:15px;
border:2px solid gray;
margin:5px;
}

/* STORE IMAGES */
#villman,#silicon{
height:100px;
width:300px;
}

/* LAPTOP GIF */
#laptop{
height:60px;
width:60px;
}

/* FOOTER */
.footer{
margin-top:10%;
position:fixed;
left:0;
bottom:0;
width:100%;
color:white;
}

b{
background-color:gray;
}

</style>
</head>


<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md">
<div class="container-fluid">

<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link" href="#" style="font-size:20px;color:white;">Shop</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#" style="font-size:20px;color:white;">Locate</a>
</li>
</ul>

<center>
<h1>Product Locator</h1>
</center>

<form class="d-flex">
<input class="form-control me-2" type="text" placeholder="Search">
<button class="btn btn-primary" type="button">Search</button>
</form>

</div>
</nav>


<!-- BUDGET BOX -->
<center>

<div id="brands">

<form>

<h3>
Want a gaming laptop?
<img id="laptop" src="https://i.gifer.com/embedded/download/YCZM.gif">
<br>
Enter your budget and let's find the right one for you!
</h3>

<input type="text" class="form-control" id="budget" placeholder="Enter here...">

</form>

</div>

</center>


<!-- BUTTON SECTION -->
<div class="container">

<div class="row">

<div>

<button id="buttons" onclick="showBrand()">
Brand & Discounts
</button>

<div id="brand"></div>

</div>


<div>

<button id="buttons" onclick="showStore()">
Store Location
</button>

<div id="stores"></div>

</div>

</div>

</div>


<script>

/* BRAND FUNCTION */

function showBrand(){

let budget = Number(document.getElementById('budget').value);

let disc = budget * 0.20;

let finalPrice = disc.toFixed(2);

document.getElementById("brand").innerHTML =

"<br><b style='color:white;'>Recommended Brands:<br>"+

"<button id='brand_btn'>Acer</button><br>"+

"<button id='brand_btn'>Asus</button><br>"+

"<button id='brand_btn'>Lenovo</button><br>"+

"<br><br>You are eligible for: "+

"<span style='color:red;'><kbd style='font-size:25px;'>"+

finalPrice +

"</kbd></span> discount.</b>";

}


/* STORE FUNCTION */

function showStore(){

document.getElementById("stores").innerHTML =

"<br><img id='villman' src='https://villman.com/images/villman_logo_2020.png' class='img-thumbnail'><br>"+

"<br><b style='color:white;'>Location:<br>"+

"<i>Cyberzone, SM City Fairview Main Building <br> Quirino Highway, Corner Regalado Hwy</i><br>"+

"<br><img id='silicon' src='https://www.wesellit.ph/Content/Images/uploaded/silicon_valley/silicon%20valley%20logo.jpg' class='img-thumbnail'><br>"+

"<br><b style='color:white;'>Location:<br>"+

"<i>SM City North EDSA Annex 1 Tunnel, Bago Bantay, <br> Quezon City, Metro Manila</i>";

}

</script>


<br><br><br>

<div class="footer">

<hr style="color:white">

<center>
Gurvinder Virk
</center>

</div>

<html>

<title>Page Title</title>
</head>
<body>



</body>
</html>
